<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Registro</title>
    <meta name="description" content="Cine Aurora - Registro" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body class="registro-body">
    <header class="site-header">
      <div class="site-header-brand">
        <a href="../index.html" class="site-logo-link">
          <h1 class="site-title">Cine Aurora</h1>
          <img 
            class="site-logo" 
            src="../assets/favicon/logo-cine.png" 
            alt="logo-cine-aurora" 
          />
        </a>
      </div>
      <div class="site-header-nav-container">
        <nav class="site-nav">
          <a class="site-nav-link" href="../index.html">Inicio</a>
          <a class="site-nav-link" href="./estrenos.html">Próximos estrenos</a>
          <a class="site-nav-link" href="../index.html">Volver</a>
        </nav>
      </div>
    </header>

    <main class="registro-main">
      <div class="registro-form-wrapper">
        <form class="registro-form" action="login.html">
          <h2 class="registro-form-title">Crear nueva cuenta</h2>

          <div class="registro-form-group">
            <label class="registro-label">Nombre Completo</label>
            <input class="registro-input" type="text" required />
          </div>

          <div class="registro-form-group">
            <label class="registro-label">Email</label>
            <input class="registro-input" type="email" required />
          </div>

          <div class="registro-form-group">
            <label class="registro-label">Fecha de nacimiento</label>
            <input class="registro-input" type="date" required />
          </div>

          <div class="registro-form-group">
            <label class="registro-label">Contraseña</label>
            <input class="registro-input" type="password" required />
          </div>

          <div class="registro-form-group">
            <label class="registro-label">Confirmar contraseña</label>
            <input class="registro-input" type="password" required />
          </div>

          <hr class="registro-divider" />

          <div class="registro-extra-section">
            <div class="registro-extra-info">
              <h3 class="registro-subtitle">Datos para ayudar al cine</h3>
              <p class="registro-secondary-text">
                Estos datos nos ayudan a mejorar tu experiencia.
              </p>
            </div>

            <div class="registro-extra-fields">
              <div class="registro-form-group">
                <label class="registro-label">Elegí tu color favorito para las butacas</label>
                <input class="registro-input registro-input-color" type="color" />
              </div>

              <div class="registro-form-group">
                <label class="registro-label">
                  ¿Cuántas entradas comprás en general? Min: 0 | Max: 10
                </label>
                <input class="registro-input registro-input-range" type="range" min="0" max="10" />
              </div>

              <div class="registro-form-group">
                <label class="registro-label">Seleccioná tu género favorito</label>
                <select class="registro-select">
                  <option>Acción</option>
                  <option>Drama</option>
                  <option>Ciencia ficción</option>
                  <option>Terror</option>
                  <option>Comedia</option>
                  <option>Romance</option>
                </select>
              </div>

              <div class="registro-form-group">
                <label class="registro-label">Elegí tu snack favorito</label>
                <div class="registro-radio-group">
                  <label>
                    <input type="radio" name="snack" />
                    Pochoclo dulce
                  </label>
                  <label>
                    <input type="radio" name="snack" />
                    Pochoclo salado
                  </label>
                  <label>
                    <input type="radio" name="snack" />
                    Chocolate
                  </label>
                  <label>
                    <input type="radio" name="snack" />
                    Frutos secos
                  </label>
                </div>
              </div>
            </div>
          </div>
          <div class="registro-button-container">
            <button class="site-button-primary" type="submit">Regístrate</button>
          </div>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <p class="site-footer-text">&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
    </footer>
  </body>
</html>
