<!doctype html>
<html lang="es">
  <head>

    <link rel="stylesheet" href="../css/style.css" />

  </head>

  <body>

    <header class="site-header">
      <div class="site-header-brand">
        <a href="../index.html" class="site-logo-link">
          <h1 class="site-title">Cine Aurora</h1>
          <img class="site-logo" src="../assets/favicon/logo-cine.png" alt="logo">

      <nav class="site-nav">

        <div class="perfil_info_general">

          </div>

          <div class="perfil_datos">
            <p>Nombre completo: John Doe</p>
            <p>Email: usuario@example.com</p>
            <p>Fecha de nacimiento: dd/mm/yyyy</p>
            <p>Contraseña: ********</p>
            <p>Miembro desde: 2026</p>
          </div>

        </div>

        <section class="perfil_peliculas">
          <h3>Películas ya vistas</h3>

          <div class="perfil_peliculas_grid">
            <img src="../assets/img/inception.jpg" alt="">
            <img src="../assets/img/memento.jpg" alt="">
            <img src="../assets/img/NCM.jpg" alt="">
            <img src="../assets/img/Sueños.jpg" alt="">

        </section>

      </section>

    <footer class="site-footer">
      <p class="site-footer-text">
        © 2026 Cine Aurora - Todos los derechos reservados
      </p>
    </footer>
